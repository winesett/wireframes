<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner 8</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="banner-8" id="banner-8" aria-labelledby="banner-8-heading">
      <div class="banner-8__mobile-frame">
        <div class="banner-8__container">
          <div class="banner-8__message">
            <img
              class="primitive-icon banner-8__mark banner-8__mark--desktop"
              src="../../../../source/figma-site/assets/9cf122f64ad5a3bc077989c0acec462e1de94ebc.svg"
              alt=""
              aria-hidden="true"
            >
            <div class="banner-8__copy">
              <h2 class="banner-8__heading" id="banner-8-heading">Medium length banner heading goes here</h2>
              <p class="banner-8__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
            <button class="banner-8__close banner-8__close--mobile" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon"
                src="../../../../source/figma-site/assets/37ab8e01284c0a28e8d2c33fee6db113c084e130.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
          <div class="banner-8__actions">
            <div class="banner-8__buttons banner-button-group">
              <button class="primitive-button banner-8__button banner-8__button--primary banner-button banner-button--primary" type="button">Button</button>
              <button class="primitive-button banner-8__button banner-8__button--secondary banner-button banner-button--secondary" type="button">Button</button>
            </div>
            <button class="banner-8__close banner-8__close--desktop" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon"
                src="../../../../source/figma-site/assets/64f896b4c3690a302cef786da86b02c1d82c4846.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
