<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 57</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-57" id="header-57" aria-labelledby="header-57-heading" data-pattern="two-button-action">
      <div class="header-57__frame">
        <div class="header-57__layout">
          <div class="header-57__intro">
            <p class="header-57__tagline header-tagline" data-slot="eyebrow">Tagline</p>
            <h1 class="header-57__heading header-heading" id="header-57-heading" data-slot="heading">Short heading here</h1>
          </div>
          <div class="header-57__content">
            <p class="header-57__text header-text" data-slot="body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
            <div class="header-57__actions" aria-label="Header actions">
              <a class="header-57__button header-57__button--primary header-button header-button--primary" href="#" data-slot="primary-action">Button</a>
              <a class="header-57__button header-57__button--secondary header-button header-button--secondary" href="#" data-slot="secondary-action">Button</a>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
