<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stats 22</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="stats-22 stats-section" id="stats-22" aria-labelledby="stats-22-heading">
      <div class="stats-22__frame stats-frame">
        <div class="stats-22__container stats-container">
          <div class="stats-22__title stats-title">
            <p class="stats-22__tagline stats-tagline">Tagline</p>
            <div class="stats-22__copy stats-copy">
              <h2 class="stats-22__heading stats-heading" id="stats-22-heading">Short heading goes here</h2>
              <p class="stats-22__text stats-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. </p>
            </div>
          </div>
          <div class="stats-22__content stats-panel">
          <dl class="stats-22__stats stats-list" aria-label="Key stats">
            <div class="stats-22__stat stats-item">
              <dt class="stats-22__number stats-number">30%</dt>
              <dd class="stats-22__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-22__stat stats-item">
              <dt class="stats-22__number stats-number">30%</dt>
              <dd class="stats-22__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-22__stat stats-item">
              <dt class="stats-22__number stats-number">30%</dt>
              <dd class="stats-22__label stats-label">Short heading goes here</dd>
            </div>
          </dl>
          <div class="stats-22__media stats-22__media--video stats-media stats-media--video" aria-label="Stats media">
            <span class="stats-22__play stats-play" aria-hidden="true"></span>
          </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
