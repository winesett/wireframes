<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner 2</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="banner-2" id="banner-2" aria-labelledby="banner-2-heading">
      <div class="banner-2__mobile-frame">
        <div class="banner-2__container">
          <div class="banner-2__message">
            <img
              class="primitive-icon banner-2__mark banner-2__mark--desktop"
              src="../../../../source/figma-site/assets/9cf122f64ad5a3bc077989c0acec462e1de94ebc.svg"
              alt=""
              aria-hidden="true"
            >
            <div class="banner-2__copy">
              <h2 class="banner-2__heading" id="banner-2-heading">Medium length banner heading goes here</h2>
              <p class="banner-2__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
          </div>
          <div class="banner-2__actions">
            <button class="primitive-button banner-2__button" type="button">Button</button>
            <button class="banner-2__close" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon banner-2__close-icon banner-2__close-icon--desktop"
                src="../../../../source/figma-site/assets/64f896b4c3690a302cef786da86b02c1d82c4846.svg"
                alt=""
                aria-hidden="true"
              >
              <img
                class="primitive-icon banner-2__close-icon banner-2__close-icon--mobile"
                src="../../../../source/figma-site/assets/37ab8e01284c0a28e8d2c33fee6db113c084e130.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
