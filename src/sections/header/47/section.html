<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 47</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-47" id="header-47" aria-labelledby="header-47-heading" data-pattern="two-button-action">
      <div class="header-47__frame">
        <div class="header-47__container">
          <div class="header-47__layout">
            <div class="header-47__intro">
              <p class="header-47__tagline header-tagline" data-slot="eyebrow">Tagline</p>
              <h1 class="header-47__heading header-heading" id="header-47-heading" data-slot="heading">Short heading here</h1>
            </div>
            <div class="header-47__content">
              <p class="header-47__text header-text" data-slot="body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
              <div class="header-47__actions" aria-label="Header actions">
                <a class="header-47__button header-47__button--primary header-button header-button--primary" href="#" data-slot="primary-action">Button</a>
                <a class="header-47__button header-47__button--secondary header-button header-button--secondary" href="#" data-slot="secondary-action">Button</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
