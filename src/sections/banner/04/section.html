<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner 4</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="banner-4" id="banner-4" aria-labelledby="banner-4-heading">
      <div class="banner-4__mobile-frame">
        <div class="banner-4__container">
          <div class="banner-4__message">
            <img
              class="primitive-icon banner-4__mark banner-4__mark--desktop"
              src="../../../../source/figma-site/assets/9cf122f64ad5a3bc077989c0acec462e1de94ebc.svg"
              alt=""
              aria-hidden="true"
            >
            <div class="banner-4__copy">
              <h2 class="banner-4__heading" id="banner-4-heading">Medium length banner heading goes here</h2>
              <p class="banner-4__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
          </div>
          <div class="banner-4__actions">
            <nav class="banner-4__social-links" aria-label="Social links">
              <a class="banner-4__social-link banner-4__social-link--facebook" href="#" aria-label="Facebook">
                <img src="../../../../source/figma-site/assets/64205548f4ee19fd0362d04f06a5d3163563eb10.svg" alt="" aria-hidden="true">
              </a>
              <a class="banner-4__social-link banner-4__social-link--instagram" href="#" aria-label="Instagram">
                <img src="../../../../source/figma-site/assets/a9930f3a5872e0ed703568c2e00004a07e8f1835.svg" alt="" aria-hidden="true">
              </a>
              <a class="banner-4__social-link banner-4__social-link--x" href="#" aria-label="X">
                <img src="../../../../source/figma-site/assets/f87710bc1f4615ed846a28cc98b1a8e493cdd257.svg" alt="" aria-hidden="true">
              </a>
              <a class="banner-4__social-link banner-4__social-link--linkedin" href="#" aria-label="LinkedIn">
                <img src="../../../../source/figma-site/assets/a7d710d788512cc497b61528d99ce3a1fd6be6db.svg" alt="" aria-hidden="true">
              </a>
            </nav>
            <button class="banner-4__close" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon banner-4__close-icon banner-4__close-icon--desktop"
                src="../../../../source/figma-site/assets/64f896b4c3690a302cef786da86b02c1d82c4846.svg"
                alt=""
                aria-hidden="true"
              >
              <img
                class="primitive-icon banner-4__close-icon banner-4__close-icon--mobile"
                src="../../../../source/figma-site/assets/37ab8e01284c0a28e8d2c33fee6db113c084e130.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
