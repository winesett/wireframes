<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 44</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="../header.shared.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-44" id="header-44" aria-labelledby="header-44-heading" data-pattern="two-button-action">
      <div class="header-44__frame">
        <div class="header-44__container">
          <div class="header-44__content">
            <div class="header-44__title">
              <p class="header-44__tagline header-tagline" data-slot="eyebrow">Tagline</p>
              <div class="header-44__copy">
                <h1 class="header-44__heading header-heading" id="header-44-heading" data-slot="heading">Short heading here</h1>
                <p class="header-44__text header-text" data-slot="body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              </div>
            </div>
            <div class="header-44__actions header-actions" aria-label="Header actions">
              <a class="header-44__button header-44__button--primary header-button header-button--primary" href="#" data-slot="primary-action">Button</a>
              <a class="header-44__button header-44__button--secondary header-button header-button--secondary" href="#" data-slot="secondary-action">Button</a>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
