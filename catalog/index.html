<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Section Catalog</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #fff;
      }

      body {
        display: grid;
        gap: 24px;
        padding: 24px 0;
      }

      iframe {
        display: block;
        width: 100vw;
        height: var(--preview-height, 260px);
        border: 0;
      }
    </style>
  </head>
  <body>
    <script>
      const previews = [
        { category: "banner", label: "Banner", number: 1, height: 260 },
        { category: "banner", label: "Banner", number: 2, height: 260 },
        { category: "banner", label: "Banner", number: 3, height: 260 },

        { category: "banner", label: "Banner", number: 5, height: 260 },
        { category: "banner", label: "Banner", number: 6, height: 260 },
        { category: "banner", label: "Banner", number: 7, height: 260 },
        { category: "banner", label: "Banner", number: 8, height: 260 },
        { category: "banner", label: "Banner", number: 9, height: 260 },
        { category: "banner", label: "Banner", number: 10, height: 260 },
        { category: "banner", label: "Banner", number: 11, height: 260 },
        { category: "banner", label: "Banner", number: 12, height: 260 },
        { category: "banner", label: "Banner", number: 13, height: 454 },

        { category: "banner", label: "Banner", number: 15, height: 260 },
        { category: "banner", label: "Banner", number: 16, height: 260 },
        { category: "header", label: "Header", number: 44, folder: "44", height: 540 },
        { category: "header", label: "Header", number: 45, folder: "45", height: 590 },
        { category: "header", label: "Header", number: 46, folder: "46", height: 420 },
        { category: "header", label: "Header", number: 47, folder: "47", height: 520 },
        { category: "header", label: "Header", number: 48, folder: "48", height: 640 },
        { category: "header", label: "Header", number: 49, folder: "49", height: 420 },

      ];

      for (const preview of previews) {
        const folder = preview.folder ?? (preview.number < 10 ? `0${preview.number}` : String(preview.number));
        const iframe = document.createElement("iframe");
        iframe.src = `../src/sections/${preview.category}/${folder}/section.html`;
        iframe.title = `${preview.label} ${preview.number} preview`;
        iframe.style.setProperty("--preview-height", `${preview.height}px`);
        document.body.appendChild(iframe);
      }
    </script>
  </body>
</html>
