<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Section Catalog - Banners</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #fff;
      }

      body {
        display: grid;
        gap: 24px;
        padding: 24px 0;
      }

      iframe {
        display: block;
        width: 100vw;
        height: var(--preview-height, 260px);
        border: 0;
      }
    </style>
  </head>
  <body>
    <script>
      const previews = [
        { number: 1, height: 260 },
        { number: 2, height: 260 },
        { number: 3, height: 260 },
        { number: 4, height: 260 },
        { number: 5, height: 260 },
        { number: 6, height: 260 },
        { number: 7, height: 260 },
        { number: 8, height: 260 },
        { number: 9, height: 260 },
        { number: 10, height: 260 },
        { number: 11, height: 260 },
        { number: 12, height: 260 },
        { number: 13, height: 454 },
        { number: 14, height: 260 },
        { number: 15, height: 260 },
        { number: 16, height: 260 },
      ];

      for (const preview of previews) {
        const folder = preview.number < 10 ? `0${preview.number}` : String(preview.number);
        const iframe = document.createElement("iframe");
        iframe.src = `../src/sections/banner/${folder}/section.html`;
        iframe.title = `Banner ${preview.number} preview`;
        iframe.style.setProperty("--preview-height", `${preview.height}px`);
        document.body.appendChild(iframe);
      }
    </script>
  </body>
</html>
