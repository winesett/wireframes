<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 67</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-67" id="header-67" aria-labelledby="header-67-heading">
      <div class="header-67__frame">
        <div class="header-67__content">
          <div class="header-67__title">
            <p class="header-67__tagline">Tagline</p>
            <div class="header-67__copy">
              <h1 class="header-67__heading" id="header-67-heading">Short heading here</h1>
              <p class="header-67__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
          </div>
          <form class="header-67__actions">
            <div class="header-67__form-row">
              <label class="sr-only" for="header-67-email">Email address</label>
              <input class="header-67__input" id="header-67-email" type="email" placeholder="Enter your email">
              <button class="header-67__submit" type="submit">Sign Up</button>
            </div>
            <p class="header-67__terms">By clicking Sign Up you're confirming that you agree with our Terms and Conditions.</p>
          </form>
        </div>
      </div>
    </header>
  </body>
</html>
