<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner 1</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="banner-1" id="banner-1" aria-labelledby="banner-1-heading">
      <div class="banner-1__mobile-frame">
        <div class="banner-1__container">
          <div class="banner-1__message">
            <img
              class="primitive-icon banner-1__mark banner-1__mark--desktop"
              src="../../../../source/figma-site/assets/9cf122f64ad5a3bc077989c0acec462e1de94ebc.svg"
              alt=""
              aria-hidden="true"
            >
            <img
              class="primitive-icon banner-1__mark banner-1__mark--mobile"
              src="../../../../source/figma-site/assets/e63419fd535b2e50a01d04e2f41524c63fa9f784.svg"
              alt=""
              aria-hidden="true"
            >
            <div class="banner-1__copy">
              <h2 class="banner-1__heading" id="banner-1-heading">Medium length banner heading goes here</h2>
              <p class="banner-1__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
          </div>
          <div class="banner-1__actions">
            <form class="banner-1__form" action="#" method="post">
              <label class="sr-only" for="banner-1-email">Email address</label>
              <input class="primitive-input banner-1__input" id="banner-1-email" type="email" placeholder="Enter your email">
              <button class="primitive-button banner-1__submit" type="submit">Sign Up</button>
            </form>
            <button class="banner-1__close" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon banner-1__close-icon banner-1__close-icon--desktop"
                src="../../../../source/figma-site/assets/64f896b4c3690a302cef786da86b02c1d82c4846.svg"
                alt=""
                aria-hidden="true"
              >
              <img
                class="primitive-icon banner-1__close-icon banner-1__close-icon--mobile"
                src="../../../../source/figma-site/assets/37ab8e01284c0a28e8d2c33fee6db113c084e130.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
