<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stats 20</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="../stats.shared.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="stats-20 stats-section" id="stats-20" aria-labelledby="stats-20-heading">
      <div class="stats-20__frame stats-frame">
        <div class="stats-20__container stats-container">
          <div class="stats-20__title stats-title">
            <p class="stats-20__tagline stats-tagline">Tagline</p>
            <div class="stats-20__copy stats-copy">
              <h2 class="stats-20__heading stats-heading" id="stats-20-heading">Short heading goes here</h2>
              <p class="stats-20__text stats-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. </p>
            </div>
          </div>
          <div class="stats-20__content stats-panel">
          <dl class="stats-20__stats stats-list" aria-label="Key stats">
            <div class="stats-20__stat stats-item">
              <dt class="stats-20__number stats-number">30%</dt>
              <dd class="stats-20__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-20__stat stats-item">
              <dt class="stats-20__number stats-number">30%</dt>
              <dd class="stats-20__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-20__stat stats-item">
              <dt class="stats-20__number stats-number">30%</dt>
              <dd class="stats-20__label stats-label">Short heading goes here</dd>
            </div>
          </dl>
          <div class="stats-20__media stats-media stats-media--image" aria-label="Stats media"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
