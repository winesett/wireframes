<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stats 21</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="../stats.shared.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="stats-21 stats-section" id="stats-21" aria-labelledby="stats-21-heading">
      <div class="stats-21__frame stats-frame">
        <div class="stats-21__container stats-container">
          <div class="stats-21__title stats-title">
            <p class="stats-21__tagline stats-tagline">Tagline</p>
            <div class="stats-21__copy stats-copy">
              <h2 class="stats-21__heading stats-heading" id="stats-21-heading">Short heading goes here</h2>
              <p class="stats-21__text stats-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. </p>
            </div>
          </div>
          <div class="stats-21__content stats-panel">
          <div class="stats-21__media stats-21__media--video stats-media stats-media--video" aria-label="Stats media">
            <span class="stats-21__play stats-play" aria-hidden="true"></span>
          </div>
          <dl class="stats-21__stats stats-list" aria-label="Key stats">
            <div class="stats-21__stat stats-item">
              <dt class="stats-21__number stats-number">30%</dt>
              <dd class="stats-21__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-21__stat stats-item">
              <dt class="stats-21__number stats-number">30%</dt>
              <dd class="stats-21__label stats-label">Short heading goes here</dd>
            </div>
            <div class="stats-21__stat stats-item">
              <dt class="stats-21__number stats-number">30%</dt>
              <dd class="stats-21__label stats-label">Short heading goes here</dd>
            </div>
          </dl>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
