<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 56</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-56" id="header-56" aria-labelledby="header-56-heading" data-pattern="two-button-action">
      <div class="header-56__frame">
        <div class="header-56__layout">
          <div class="header-56__intro">
            <p class="header-56__tagline header-tagline" data-slot="eyebrow">Tagline</p>
            <h1 class="header-56__heading header-heading" id="header-56-heading" data-slot="heading">Short heading here</h1>
          </div>
          <div class="header-56__content">
            <p class="header-56__text header-text" data-slot="body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
            <div class="header-56__actions" aria-label="Header actions">
              <a class="header-56__button header-56__button--primary header-button header-button--primary" href="#" data-slot="primary-action">Button</a>
              <a class="header-56__button header-56__button--secondary header-button header-button--secondary" href="#" data-slot="secondary-action">Button</a>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
