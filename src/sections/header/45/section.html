<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header 45</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <header class="header-45" id="header-45" aria-labelledby="header-45-heading">
      <div class="header-45__frame">
        <div class="header-45__container">
          <div class="header-45__content">
            <div class="header-45__title">
              <p class="header-45__tagline">Tagline</p>
              <div class="header-45__copy">
                <h1 class="header-45__heading" id="header-45-heading">Short heading here</h1>
                <p class="header-45__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              </div>
            </div>
            <form class="header-45__actions">
              <div class="header-45__form-row">
                <label class="sr-only" for="header-45-email">Email address</label>
                <input class="header-45__input" id="header-45-email" type="email" placeholder="Enter your email">
                <button class="header-45__submit" type="submit">Sign Up</button>
              </div>
              <p class="header-45__terms">By clicking Sign Up you're confirming that you agree with our Terms and Conditions.</p>
            </form>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
