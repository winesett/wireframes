<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner 6</title>
    <link rel="stylesheet" href="../../../tokens.css">
    <link rel="stylesheet" href="../../../primitives.css">
    <link rel="stylesheet" href="./section.css">
  </head>
  <body>
    <section class="banner-6" id="banner-6" aria-labelledby="banner-6-heading">
      <div class="banner-6__mobile-frame">
        <div class="banner-6__container">
          <div class="banner-6__message">
            <img
              class="primitive-icon banner-6__mark banner-6__mark--desktop"
              src="../../../../source/figma-site/assets/9cf122f64ad5a3bc077989c0acec462e1de94ebc.svg"
              alt=""
              aria-hidden="true"
            >
            <div class="banner-6__copy">
              <h2 class="banner-6__heading" id="banner-6-heading">Medium length banner heading goes here</h2>
              <p class="banner-6__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
          </div>
          <div class="banner-6__actions">
            <form class="banner-6__form banner-button-group" action="#" method="post">
              <label class="sr-only" for="banner-6-email">Email address</label>
              <input class="primitive-input banner-6__input" id="banner-6-email" type="email" placeholder="Enter your email">
              <button class="primitive-button banner-6__submit banner-button banner-button--primary" type="submit">Sign Up</button>
            </form>
            <button class="banner-6__close" type="button" aria-label="Dismiss banner">
              <img
                class="primitive-icon banner-6__close-icon banner-6__close-icon--desktop"
                src="../../../../source/figma-site/assets/64f896b4c3690a302cef786da86b02c1d82c4846.svg"
                alt=""
                aria-hidden="true"
              >
              <img
                class="primitive-icon banner-6__close-icon banner-6__close-icon--mobile"
                src="../../../../source/figma-site/assets/37ab8e01284c0a28e8d2c33fee6db113c084e130.svg"
                alt=""
                aria-hidden="true"
              >
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
